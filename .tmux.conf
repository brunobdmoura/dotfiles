unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g base-index 1

bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

setw -g mode-keys vi

unbind '"'
unbind %

unbind -n C-p
unbind -n C-n

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key S choose-tree -s

set -g mouse on

set-option -g allow-rename off
set-option -g renumber-windows on

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'bg=brightblack, fg=white'
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle

# panes
set -g pane-border-style 'fg=black bold'
set -g pane-active-border-style 'fg=green bold'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=black bold'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=white bg=black'
set -g status-right '[%Hh%Mm, %d-%m-%Y]'

set -g status-right-length 50

setw -g window-status-current-style 'fg=white bg=black'
setw -g window-status-current-format '|#I: #W #F, at #(basename "#{pane_current_path}" 2>/dev/null || echo "~")'

setw -g window-status-style 'fg=black bg=black'
setw -g window-status-format '|#I: #W #F, at #(basename "#{pane_current_path}" 2>/dev/null || echo "~")'

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=green bg=black'
