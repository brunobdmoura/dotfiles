#
# General configs
#

# Use C-a as prefix and allow use of C-a on other applications by douple tapping
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start index on 1 instead of 0
set -g base-index 1

# Enables underline styles
set -a terminal-features '*:usstyle'

# Esc pressing delay set to 0ms
set -sg escape-time 0

# Scrollback buffer set to 50k lines
set -g history-limit 50000

# Use 256 color terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Don't rename windows automatically
set-option -g allow-rename off

# Automatically renumber windows
set -g renumber-windows on

# If destroying a session, do not deatach
set -g detach-on-destroy off

# Use vim keybindings for moving around
setw -g mode-keys vi

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Allow terminal clipboard integration
set -s set-clipboard on

# Don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Vertical split in vim-like motion
unbind %
bind-key v split-window -h -c "#{pane_current_path}"

# Horizontal split in vim-like motion
unbind '"'
bind-key s split-window -v -c "#{pane_current_path}"

# Move through panes like vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#
# 'Meta' binds
#

# Easy config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Fuzzy find through sessions
bind S run-shell "tmux list-sessions -F '##{session_name}' |\
                  fzf --tmux=center,70% --border-label='Tmux Sessions' --style=minimal |\
                  xargs -I {} tmux switch-client -t '{}'"

# Create new named tab
bind C command-prompt -p "Session name:" { new-session -A -s '%%' }

# Split window in 'defaut' layout
bind b split-window -v -p 25 -c "#{pane_current_path}"

# Enable Ctrl-V for block selection (rectangle-toggle) in vi copy mode
# Enable 'v' to begin character selection in vi copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Enable 'y' to yank (copy) the selection and exit copy mode
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Enter' send -X copy-selection-and-cancel

#
# Appearance
#

# Clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=grey bold'

# Panes
set -g pane-border-style 'fg=black bold'
set -g pane-active-border-style 'fg=green bold'

# Statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=black bold'
set -g status-left ''
set -g status-right-style 'fg=white bg=black'
set -g status-right '#{?client_prefix,#[fg=blue][Prefixed],#[fg=green][#S]}#[fg=white][%Hh%Mm, %d-%m-%Y]'
set -g status-right-length 50
setw -g window-status-current-style 'fg=white bg=black'
setw -g window-status-current-format '|#I: #W #F, at #(basename "#{pane_current_path}" 2>/dev/null || echo "~")'
setw -g window-status-style 'fg=black bg=black'
setw -g window-status-format '|#I: #W #F, at #(basename "#{pane_current_path}" 2>/dev/null || echo "~")'
setw -g window-status-bell-style 'fg=yellow bg=red bold'
set -g message-style 'fg=grey bold bg=black'
